name: Build Android APK with Buildozer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Cho phép người dùng chủ động nhấn nút chạy build thủ công bất kỳ lúc nào trên web

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Tải mã nguồn từ kho lưu trữ về máy chủ ảo
      - name: Checkout Code
        uses: actions/checkout@v4

      # Bước 2: Thiết lập môi trường Python 3.10 ổn định nhất cho Buildozer
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Bước 3: Cài đặt toàn bộ các thư viện hệ thống Linux & thư viện Đồ họa SDL2 bắt buộc cho Kivy
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk-headless autoconf libtool libtool-bin automake pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev gettext libltdl-dev libgmp-dev
          # Cài đặt bổ sung đầy đủ bộ thư viện phát triển đồ họa SDL2 để Kivy biên dịch thành công 100%
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
          pip install --upgrade pip
          pip install buildozer cython virtualenv sh

      # Bước 4: Thiết lập Bộ nhớ đệm (Cache) cho Buildozer để tăng tốc độ cho lần build sau
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      # Bước 5: Thực hiện lệnh đóng gói tự động (Sử dụng 'yes y |' để tự động trả lời YES cho mọi câu hỏi SDK/NDK license)
      - name: Build APK with Buildozer
        run: |
          yes y | buildozer -v android debug
        shell: bash

      # Bước 6: Tải file .APK thành phẩm lên mục Artifacts trên Web GitHub để tải về
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EVN-Telemetry-App
          path: bin/*.apk
